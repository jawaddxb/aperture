[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aperture-sdk"
version = "0.1.0"
description = "Python SDK for Aperture — AI-native browser automation engine"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "ApertureHQ", email = "hello@aperture.dev" }]
keywords = ["browser", "automation", "scraping", "ai", "agent", "stealth"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
sse = ["httpx-sse>=0.4.0"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
]

[project.urls]
Homepage = "https://github.com/jawaddxb/aperture"
Documentation = "https://github.com/jawaddxb/aperture/tree/main/packages/python-sdk"
Repository = "https://github.com/jawaddxb/aperture"

[tool.hatch.build.targets.wheel]
packages = ["aperture"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
