version: "3.8"

services:
  aperture:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./aperture.yaml:/app/aperture.yaml:ro
    environment:
      - APERTURE_SERVER_PORT=8080
      - APERTURE_BROWSER_CHROMIUM_PATH=/usr/bin/chromium
      - APERTURE_BROWSER_POOL_SIZE=3
      - APERTURE_STEALTH_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
