<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Field Form</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    label { display: block; margin-top: 1rem; }
    input, select, textarea { margin-top: 0.25rem; padding: 0.25rem; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    #result { margin-top: 1rem; color: green; display: none; }
  </style>
</head>
<body>
  <h1>Form</h1>
  <form id="mainForm">
    <label for="name">Name
      <input id="name" name="name" type="text" placeholder="Your name">
    </label>

    <label for="color">Favourite color
      <select id="color" name="color">
        <option value="">Select…</option>
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
      </select>
    </label>

    <label>
      <input id="agree" name="agree" type="checkbox"> I agree to the terms
    </label>

    <label for="notes">Notes
      <textarea id="notes" name="notes" rows="3" placeholder="Additional notes…"></textarea>
    </label>

    <button type="submit" id="submitBtn">Submit</button>
  </form>

  <div id="result">Form submitted!</div>

  <script>
    document.getElementById('mainForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('result').style.display = 'block';
    });
  </script>
</body>
</html>
